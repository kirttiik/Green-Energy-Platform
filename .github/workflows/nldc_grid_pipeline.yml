name: NLDC Grid Intelligence Pipeline

on:
  schedule:
    # 06:00 AM IST is 00:30 AM UTC
    - cron: '30 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape-grid-frequency:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # If playwright is used in other modules during this run, install it
          playwright install chromium
          
      - name: Run NLDC Grid Frequency Scraper
        env:
          # Use GitHub Secrets to securely pass the Postgres connection string
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/ingestion/nldc_grid_scraper.py
          
      - name: Commit Local CSV Fallbacks (if database unavailable)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/grid/
          git commit -m "Automated Run: Updated NLDC Grid Frequency Local Fallback Data" || echo "No changes to commit"
          git push
